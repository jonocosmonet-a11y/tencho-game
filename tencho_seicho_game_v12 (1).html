<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>店長成長ゲーム</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f5f5f7;color:#1d1d1f;}
.app{max-width:480px;margin:0 auto;padding:12px;}
.ttl{font-size:17px;font-weight:700;text-align:center;margin-bottom:10px;}
.nav{display:flex;gap:4px;margin-bottom:10px;background:#fff;border-radius:12px;padding:4px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.nav-btn{flex:1;padding:7px 4px;font-size:11px;font-weight:500;border:none;border-radius:8px;cursor:pointer;background:transparent;color:#888;}
.nav-btn.on{background:#534AB7;color:#fff;}
.tabs{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.grp{font-size:10px;color:#888;font-weight:600;margin:4px 0 2px;width:100%;}
.tb{flex:1;min-width:72px;padding:6px 4px;font-size:11px;font-weight:500;background:#fff;border:1px solid #e0e0e0;border-radius:8px;cursor:pointer;color:#888;text-align:center;line-height:1.3;}
.tb.on{background:#534AB7;color:#fff;border-color:#534AB7;}
.card{background:#fff;border-radius:12px;padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.sec-title{font-size:11px;font-weight:600;color:#888;margin-bottom:8px;}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;}
.char-stage{display:flex;flex-direction:column;align-items:center;padding:10px 0 4px;}
.char-name-row{display:flex;align-items:center;gap:6px;margin-top:6px;}
.char-name{font-size:17px;font-weight:600;}
.role-b{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;}
.role-t{background:#EEEDFE;color:#3C3489;}
.role-f{background:#E1F5EE;color:#085041;}
.shop-lbl{font-size:11px;color:#888;margin-top:2px;}
.form-name{font-size:12px;color:#888;margin-top:1px;}
.pts-big{font-size:28px;font-weight:700;margin-top:4px;}
.speech{position:relative;background:#f5f5f7;border-radius:12px;padding:8px 12px;font-size:12px;margin-top:8px;width:100%;text-align:center;}
.speech::before{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:#f5f5f7;}
/* バッジエリア */
.badge-strip{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px;padding:8px 0;}
.badge-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.badge-star{font-size:22px;line-height:1;}
.badge-label{font-size:9px;color:#888;text-align:center;}
/* bars */
.bar-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.bar-lbl{font-size:11px;color:#888;width:48px;flex-shrink:0;}
.bar-bg{flex:1;background:#efefef;border-radius:4px;height:7px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .4s;}
.bar-val{font-size:11px;color:#888;width:24px;text-align:right;}
/* GAP table */
.gap-table{width:100%;border-collapse:collapse;font-size:11px;}
.gap-table th{background:#f5f5f7;padding:5px 6px;text-align:center;font-weight:600;color:#666;border-bottom:1px solid #e8e8e8;}
.gap-table th:first-child{text-align:left;}
.gap-table td{padding:5px 6px;text-align:center;border-bottom:1px solid #f0f0f0;color:#444;}
.gap-table td:first-child{text-align:left;font-weight:500;}
.gap-pos{color:#0F6E56;font-weight:600;}
.gap-neg{color:#A32D2D;font-weight:600;}
/* calendar */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cal-month{font-size:13px;font-weight:600;}
.cal-nav{background:none;border:1px solid #e0e0e0;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:13px;color:#534AB7;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{text-align:center;font-size:10px;font-weight:600;color:#888;padding:3px 0;}
.cal-dow.sun{color:#E8453C;}.cal-dow.sat{color:#1E6FDE;}
.cal-day{text-align:center;padding:3px 1px;font-size:11px;border-radius:6px;cursor:pointer;min-height:30px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border:1px solid transparent;background:#f9f9f9;}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-day.today{border-color:#534AB7;}
.cal-day.work{background:#E1F5EE;border-color:#5DCAA5;}
.cal-day.off{background:#FCEBEB;border-color:#F09595;}
.cal-day.sun-txt{color:#E8453C;}.cal-day.sat-txt{color:#1E6FDE;}
.cal-day-num{font-size:11px;font-weight:500;line-height:1;}
.cal-day-lbl{font-size:8px;line-height:1;}
.cal-day.work .cal-day-lbl{color:#085041;}
.cal-day.off .cal-day-lbl{color:#A32D2D;}
.cal-legend{display:flex;gap:10px;margin-top:6px;font-size:10px;color:#888;justify-content:flex-end;}
.cal-legend span{display:flex;align-items:center;gap:3px;}
.cal-legend i{width:10px;height:10px;border-radius:3px;display:inline-block;}
.neglect{background:#FAECE7;border:1px solid #F0997B;border-radius:10px;padding:8px 12px;font-size:12px;color:#993C1D;margin-bottom:8px;display:none;text-align:center;}
/* todo */
.todo-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f0f0f0;}
.todo-item:last-child{border-bottom:none;}
.todo-cb{width:20px;height:20px;border-radius:6px;border:2px solid #d0d0d0;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;}
.todo-cb.done{background:#534AB7;border-color:#534AB7;color:#fff;}
.todo-txt{font-size:12px;flex:1;line-height:1.4;}
.todo-txt.done{text-decoration:line-through;color:#bbb;}
.todo-pts{font-size:10px;font-weight:600;color:#0F6E56;flex-shrink:0;}
.todo-input-row{display:flex;gap:6px;margin-top:8px;}
.todo-input{flex:1;font-size:12px;padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;outline:none;}
.todo-add-btn{padding:7px 12px;background:#534AB7;color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;white-space:nowrap;}
/* evo */
.evo-track{display:flex;align-items:center;justify-content:center;gap:3px;margin:8px 0;flex-wrap:wrap;}
.ed{width:34px;height:34px;border-radius:50%;border:2px solid #e0e0e0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#aaa;background:#f9f9f9;text-align:center;line-height:1.2;}
.ed.done{border-color:#7F77DD;background:#EEEDFE;color:#3C3489;}
.ed.cur{border-color:#534AB7;background:#534AB7;color:#fff;font-weight:600;}
.el{width:10px;height:2px;background:#e0e0e0;border-radius:1px;}
.el.done{background:#7F77DD;}
/* log */
.log-list{max-height:100px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;}
.li{font-size:11px;padding:3px 8px;border-radius:5px;}
.li.g{background:#EAF3DE;color:#3B6D11;}
.li.b{background:#FCEBEB;color:#A32D2D;}
.li.w{background:#FAEEDA;color:#633806;}
/* sync btn */
.sync-btn{padding:7px 14px;background:#E1F5EE;color:#085041;border:1px solid #5DCAA5;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px;}
.sync-btn:active{opacity:.7;}
.sync-status{font-size:10px;color:#888;margin-top:4px;}
/* admin */
.admin-tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;}
.admin-tab{flex:1;min-width:70px;padding:7px 4px;font-size:11px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:8px;cursor:pointer;color:#888;text-align:center;}
.admin-tab.on{background:#534AB7;color:#fff;border-color:#534AB7;}
.admin-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.admin-row label{font-size:11px;color:#666;width:110px;flex-shrink:0;}
.admin-row input{flex:1;font-size:12px;padding:5px 8px;border:1px solid #e0e0e0;border-radius:6px;outline:none;}
.admin-save{padding:8px 16px;background:#534AB7;color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;margin-top:6px;}
.shop-block{background:#f9f9f9;border-radius:10px;padding:10px;margin-bottom:8px;}
.shop-block-name{font-size:12px;font-weight:600;color:#534AB7;margin-bottom:6px;}
.rev-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.rev-item{background:#f9f9f9;border-radius:10px;padding:9px 8px;}
.rev-name{font-size:11px;color:#666;margin-bottom:3px;font-weight:500;}
.rev-kpi{font-size:10px;color:#aaa;margin-bottom:4px;}
.rev-input{width:100%;font-size:14px;font-weight:600;padding:5px 6px;border:1px solid #e0e0e0;border-radius:6px;text-align:center;outline:none;background:#fff;}
.rev-status{font-size:10px;margin-top:3px;text-align:center;font-weight:600;}
.rev-status.ok{color:#0F6E56;}.rev-status.ng{color:#A32D2D;}

/* 気持ちアイコン */
.mood-section{background:#fff;border-radius:12px;padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.mood-icons-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.mood-icon-btn{font-size:26px;background:none;border:2px solid transparent;border-radius:12px;padding:4px 6px;cursor:pointer;transition:transform .15s,border-color .15s;line-height:1;}
.mood-icon-btn:active{transform:scale(.9);}
.mood-icon-btn.selected{border-color:#534AB7;background:#EEEDFE;}
.mood-comment-row{display:flex;gap:6px;margin-top:6px;}
.mood-comment-input{flex:1;font-size:12px;padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;outline:none;}
.mood-save-btn{padding:7px 12px;background:#534AB7;color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;}
/* 吹き出し表示 */
.mood-bubble-area{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.mood-bubble-icon{font-size:30px;flex-shrink:0;line-height:1;}
.mood-bubble{position:relative;background:#f5f5f7;border-radius:12px;padding:7px 11px;font-size:12px;color:#444;max-width:220px;line-height:1.5;}
.mood-bubble::before{content:'';position:absolute;left:-7px;top:10px;border:5px solid transparent;border-right-color:#f5f5f7;}
.mood-bubble-time{font-size:9px;color:#aaa;margin-top:2px;}
</style>
</head>

<div class="app">
<div id="sync-banner" style="display:none;background:#E8F5E9;color:#2E7D32;font-size:11px;text-align:center;padding:6px;border-radius:8px;margin-bottom:6px;"></div>
<div class="ttl" style="display:flex;align-items:center;justify-content:center;gap:8px;"><span>🏪 店長成長ゲーム</span><button id="bgm-btn" onclick="toggleBGM()" style="font-size:18px;background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:8px;line-height:1;opacity:0.5;" title="BGM ON/OFF">🔇</button><button onclick="manualSync()" style="font-size:16px;background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:8px;line-height:1;opacity:0.6;" title="データ同期">☁️</button></div>
<div class="nav">
  <button class="nav-btn on" onclick="switchMode('game')">🎮 育成</button>
  <button class="nav-btn" onclick="switchMode('admin')">⚙️ J管理画面</button>
</div>
<div id="mode-game">
  <div class="tabs" id="tabs"></div>
  <div id="neglect" class="neglect">⚠️ 出勤日なのに未更新！ -5pt 自動減点</div>
  <div id="char-panel"></div>
</div>
<div id="mode-admin" style="display:none;">
  <div class="card">
    <div style="font-size:14px;font-weight:700;text-align:center;margin-bottom:10px;">⚙️ J管理画面</div>
    <div class="admin-tabs">
      <button class="admin-tab on" onclick="switchAdminTab('shop')">店舗設定</button>
      <button class="admin-tab" onclick="switchAdminTab('kpi')">収益KPI</button>
      <button class="admin-tab" onclick="switchAdminTab('ichiba')">市場目標</button>
      <button class="admin-tab" onclick="switchAdminTab('excel')">実績反映</button>
    </div>
    <div id="admin-shop"></div>
    <div id="admin-kpi" style="display:none;"></div>
    <div id="admin-ichiba" style="display:none;"></div>
    <div id="admin-excel" style="display:none;"></div>
  </div>
</div>
</div>

function getGrid(charId,sk){
  if(charId==="oka") return OKA_GRIDS[sk]||BASE_GRIDS[sk];
  if(charId==="take") return TAKE_GRIDS[sk]||BASE_GRIDS[sk];
  if(charId==="fuji") return FUJI_GRIDS[sk]||BASE_GRIDS[sk];
  if(charId==="shio") return SHIO_GRIDS[sk]||BASE_GRIDS[sk];
  return BASE_GRIDS[sk];
}

function drawPixelChar(sk,charId){
  const grid=getGrid(charId||"kura",sk);
  const pal=PALS[sk],ps=5;
  const cols=grid[0].length,rows=grid.length;
  const cv=document.createElement("canvas");
  cv.width=cols*ps;cv.height=rows*ps;
  cv.style.width=cols*ps+"px";cv.style.height=rows*ps+"px";
  cv.style.imageRendering="pixelated";
  const ctx=cv.getContext("2d");
  grid.forEach((row,ry)=>{for(let cx=0;cx<row.length;cx++){const c=pal[row[cx]];if(!c)continue;ctx.fillStyle=c;ctx.fillRect(cx*ps,ry*ps,ps,ps);}});
  return cv;
}

function getBadgeLevel(target,actual){
  if(!target||target===0)return 0;
  const rate=actual/target;
  if(rate>=1.2)return 2;
  if(rate>=1.0)return 1;
  return 0;
}

// 市場比較バッジレベル: vs市場進捗GAPで判定
// marketTarget/marketActual = 中四国CNCの目標・累計
// myTarget/myActual = 自店の目標・累計
function getBadgeLevelVsMarket(myTarget,myActual,mktTarget,mktActual){
  if(!myTarget||myTarget===0)return 0;
  const myRate=myActual/myTarget;
  const mktRate=(mktTarget>0)?mktActual/mktTarget:0;
  const gap=myRate-mktRate;
  if(gap>=0.05)return 2;  // 市場より5%pt以上上回る → ★★
  if(gap>=0)   return 1;  // 市場を上回る → ★
  return 0;               // 市場以下 → ☆
}

  const star1=level>=1

    :`<span style="color:${badge.colorEmpty};font-size:18px;line-height:1;">☆</span>`;

async function syncFromSpreadsheet(charId){
  const sn=shopSettings[charId]?.sheetName;
  if(!sn){alert("J管理画面でシート名（店舗名）を設定してください");return;}
  const statusEl=document.getElementById("sync-status-"+charId);
  if(statusEl)statusEl.textContent="同期中...";

  try{
    // ルーティンTodo同期
    const routineUrl=`https://docs.google.com/spreadsheets/d/${ROUTINE_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sn)}`;
    const routineRes=await fetch(routineUrl);
    if(routineRes.ok){
      const csv=await routineRes.text();
      parseRoutineTodo(charId,csv);
    }

    // 収益実績同期（業務報告シート）
    const revenueUrl=`https://docs.google.com/spreadsheets/d/${REVENUE_SHEET_ID}/gviz/tq?tqx=out:csv`;
    const revenueRes=await fetch(revenueUrl);
    if(revenueRes.ok){
      const csv=await revenueRes.text();
      parseRevenueData(charId,csv,sn);
    }

    saveData();
    if(statusEl)statusEl.textContent="✅ 同期完了！ "+new Date().toLocaleTimeString();
    renderChar();
  }catch(e){
    if(statusEl)statusEl.textContent="⚠️ 同期失敗（ネットワーク確認してください）";
  }
}

function parseRoutineTodo(charId,csv){
  const rows=csv.split("\n").map(r=>r.split(",").map(c=>c.replace(/^"|"$/g,"").trim()));
  const s=state[charId];
  let ptsAdded=0;
  ROUTINE_TODOS.forEach(t=>{
    const row=rows.find(r=>r[1]&&r[1].includes(t.label.slice(0,6)));
    if(!row)return;
    // 合計列（最後の列）をチェック
    const total=parseInt(row[row.length-1]);
    const wasDone=s.routineTodos[t.id];
    const isDone=!isNaN(total)&&total>0;
    if(isDone&&!wasDone){
      s.routineTodos[t.id]=true;
      s.pts+=t.pts;
      s.lastActionDate=todayKey();
      ptsAdded+=t.pts;
      logs.push({text:`${CHARS.find(c=>c.id===charId).name}「${t.label}」ルーティン完了+${t.pts}pt`,type:"g"});
    } else if(!isDone&&wasDone){
      s.routineTodos[t.id]=false;
    }
  });
}

function parseRevenueData(charId,csv,sheetName){
  const rows=csv.split("\n").map(r=>r.split(",").map(c=>c.replace(/^"|"$/g,"").trim()));
  const headerRow=rows[2]||[];
  const storeCol=headerRow.findIndex(h=>h===sheetName||h.includes(sheetName.replace(/^[SYP]/,"")));
  if(storeCol<0)return;

  const s=state[charId];
  Object.entries(REVENUE_ROW_MAP).forEach(([revName,rowKeyword])=>{
    const row=rows.find(r=>r[0]&&r[0].includes(rowKeyword.slice(0,6)));
    if(!row)return;
    const bVal=parseFloat((row[1]||"").replace(/,/g,""));
    const dVal=parseFloat((row[storeCol]||"").replace(/,/g,""));
    if(!isNaN(bVal))s.revenue[revName].target=bVal;
    if(!isNaN(dVal))s.revenue[revName].actual=dVal;
  });
}

function buildCalendar(){
  const y=calYear,m=calMonth,today=new Date();
  const firstDow=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  const mn=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  let h=`<div class="cal-header"><button class="cal-nav" onclick="prevMonth()">◀</button><div class="cal-month">${y}年 ${mn[m]}</div><button class="cal-nav" onclick="nextMonth()">▶</button></div><div class="cal-grid">`;
  ["日","月","火","水","木","金","土"].forEach((d,i)=>{h+=`<div class="cal-dow${i===0?" sun":i===6?" sat":""}">${d}</div>`;});
  for(let i=0;i<firstDow;i++)h+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=dim;d++){
    const dow=(firstDow+d-1)%7,isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    const k=dateKey(y,m,d),v=(state[cur].shift||{})[k];
    const cls=["cal-day",v==="work"?"work":v==="off"?"off":"",isToday?"today":"",dow===0?"sun-txt":dow===6?"sat-txt":""].filter(Boolean).join(" ");
    h+=`<div class="${cls}" onclick="toggleShift(${y},${m},${d})"><div class="cal-day-num">${d}</div>${v?`<div class="cal-day-lbl">${v==="work"?"出勤":"公休"}</div>`:""}</div>`;
  }
  h+=`</div><div class="cal-legend"><span><i style="background:#E1F5EE;border:1px solid #5DCAA5;"></i>出勤</span><span><i style="background:#FCEBEB;border:1px solid #F09595;"></i>公休</span><span style="color:#aaa">タップで切替</span></div>`;
  return h;
}

// ===== エクセル読み込み（市場実績）=====
function handleIchibaExcel(input){
  const file=input.files[0]; if(!file) return;
  const status=document.getElementById("excel-status");
  status.textContent="読み込み中...";

  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:"array"});

      // ===== 各種実績シート =====
      const ws=wb.Sheets[wb.SheetNames.find(n=>n.includes("各種実績"))||wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});

      const get=(row,col)=>{const v=row[col];return isNaN(parseFloat(v))?0:parseFloat(v)||0;};

      // 中四国CNC行 → 市場平均（目標・累計）
      const cncRow=json.find(r=>r&&r[12]==="中四国CNC");
      if(cncRow){
        Object.entries(ICHIBA_COLS).forEach(([name,[tCol,aCol]])=>{
          if(!ichibaData[name])ichibaData[name]={national_target:0,national_actual:0,results:{}};
          ichibaData[name].national_target=get(cncRow,tCol);
          ichibaData[name].national_actual=get(cncRow,aCol);
        });
      }

      // 各店舗の実績を反映（店舗名で部分一致）
      let updated=0;
      CHARS.forEach(c=>{
        const storeName=(shopSettings[c.id].name||"").replace(/^[SYP]/,"").trim();
        if(!storeName)return;
        const row=json.find((r,i)=>i>3&&r[12]&&String(r[12]).includes(storeName));
        if(!row)return;

        if(!state[c.id].badges)state[c.id].badges={};
        Object.entries(ICHIBA_COLS).forEach(([name,[tCol,aCol]])=>{
          const badgeId={
            "MNP":"mnp","YS":"ys","SB機変":"sb_kihenn","YM機変":"ym_kihen","固定":"kotei"
          }[name];
          if(!state[c.id].badges[badgeId])state[c.id].badges[badgeId]={target:0,actual:0};
          state[c.id].badges[badgeId].target=get(row,tCol);
          state[c.id].badges[badgeId].actual=get(row,aCol);
          if(!ichibaData[name].results)ichibaData[name].results={};
          ichibaData[name].results[c.id]=get(row,aCol);
        });
        logs.push({text:`${c.name} 市場実績反映完了`,type:"g"});
        updated++;
      });

      // ===== ペイトクシート =====
      const wsP=wb.Sheets[wb.SheetNames.find(n=>n.includes("ペイトク"))];
      if(wsP){
        const jsonP=XLSX.utils.sheet_to_json(wsP,{header:1,defval:""});
        // 全国行（r[12]==='全国'）のBE列(JS56)=累計|機変ペイトク加入率 60.6% を市場平均として使用
        const zenPayRow=jsonP.find(r=>r&&r[12]==="全国");
        if(zenPayRow){
          const rate=parseFloat(zenPayRow[56])||0;
          ichibaData["ペイトク_市場加入率"]=Math.round(rate*1000)/10;
        }
        // 各店舗の累計|機変ペイトク 加入率
        CHARS.forEach(c=>{
          const storeName=(shopSettings[c.id].name||"").replace(/^[SYP]/,"").trim();
          if(!storeName)return;
          const row=jsonP.find((r,i)=>i>3&&r[12]&&String(r[12]).includes(storeName));
          if(!row)return;
          const rate=parseFloat(row[56])||0; // 累計|機変ペイトク 加入率
          if(!state[c.id].paytoku)state[c.id].paytoku={rate:0,target:0};
          state[c.id].paytoku.rate=Math.round(rate*1000)/10;
        });
      }

      saveData();
      status.innerHTML=`✅ ${updated}名分の市場実績を反映しました！<br><span style="font-size:10px;color:#aaa">ファイル：${file.name}</span>`;
      if(mode==="game")renderChar();
    }catch(err){
      status.textContent="❌ 読み込みエラー："+err.message;
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

<script>
// ===== BGM (Web Audio API ピコピコ) =====
let bgmCtx=null,bgmPlaying=false,bgmNodes=[],bgmScheduled=false;
let bgmCurrentStage="";

// ノート周波数 (equal temperament)
const N={
  C3:130.8,D3:146.8,E3:164.8,F3:174.6,G3:196,A3:220,B3:246.9,
  C4:261.6,D4:293.7,E4:329.6,F4:349.2,G4:392,A4:440,B4:493.9,
  C5:523.3,D5:587.3,E5:659.3,F5:698.5,G5:784,A5:880,B5:987.8,
  C6:1046.5,_:0
};

// === BGM定義: [周波数, 音長(秒), 波形] ===
// s0/s1/s2/s3: 明るいポップ
const BGM_NORMAL=[
  [N.C4,.12,"square"],[N.E4,.12,"square"],[N.G4,.12,"square"],[N.C5,.18,"square"],
  [N._,.06,""],[N.G4,.12,"square"],[N.E4,.12,"square"],[N.C4,.12,"square"],
  [N.D4,.12,"square"],[N.F4,.12,"square"],[N.A4,.12,"square"],[N.D5,.18,"square"],
  [N._,.06,""],[N.A4,.12,"square"],[N.F4,.12,"square"],[N.D4,.12,"square"],
  [N.E4,.12,"square"],[N.G4,.12,"square"],[N.B4,.12,"square"],[N.E5,.12,"square"],
  [N.G5,.12,"square"],[N.E5,.12,"square"],[N.C5,.12,"square"],[N.G4,.12,"square"],
  [N.C5,.12,"square"],[N.B4,.12,"square"],[N.A4,.12,"square"],[N.G4,.24,"square"],
  [N._,.12,""],
];
// s4: お祝いファンファーレ風
const BGM_WIN=[
  [N.C4,.08,"square"],[N.C4,.08,"square"],[N.C4,.08,"square"],
  [N.C4,.18,"square"],[N.E4,.18,"square"],[N.G4,.18,"square"],[N.C5,.3,"square"],
  [N._,.1,""],
  [N.G4,.08,"square"],[N.A4,.08,"square"],[N.G4,.08,"square"],
  [N.E4,.18,"square"],[N.G4,.18,"square"],[N.C5,.18,"square"],[N.E5,.3,"square"],
  [N._,.1,""],
  [N.C5,.12,"square"],[N.B4,.12,"square"],[N.A4,.12,"square"],[N.G4,.12,"square"],
  [N.A4,.12,"square"],[N.B4,.12,"square"],[N.C5,.12,"square"],[N.E5,.12,"square"],
  [N.G5,.36,"square"],[N._,.12,""],
];
// neg: 暗くてゆっくり
const BGM_SAD=[
  [N.A3,.2,"triangle"],[N._,.05,""],[N.G3,.2,"triangle"],[N._,.05,""],
  [N.F3,.2,"triangle"],[N._,.05,""],[N.E3,.3,"triangle"],[N._,.1,""],
  [N.D3,.2,"triangle"],[N._,.05,""],[N.E3,.2,"triangle"],[N._,.05,""],
  [N.F3,.2,"triangle"],[N._,.05,""],[N.G3,.4,"triangle"],[N._,.15,""],
  [N.A3,.15,"triangle"],[N.G3,.15,"triangle"],[N.F3,.15,"triangle"],
  [N.E3,.15,"triangle"],[N.D3,.4,"triangle"],[N._,.2,""],
];

function getBGMForStage(sk){
  if(sk==="s4") return BGM_WIN;
  if(sk==="neg") return BGM_SAD;
  return BGM_NORMAL;
}

function initAudio(){
  if(!bgmCtx) bgmCtx=new(window.AudioContext||window.webkitAudioContext)();
}

function playBGMLoop(notes,startTime){
  if(!bgmPlaying||!bgmCtx) return;
  let t=startTime;
  notes.forEach(([freq,dur,wave])=>{
    if(!freq||!wave){t+=dur;return;}
    const osc=bgmCtx.createOscillator();
    const gain=bgmCtx.createGain();
    osc.connect(gain);gain.connect(bgmCtx.destination);
    osc.type=wave;
    osc.frequency.value=freq;
    gain.gain.setValueAtTime(0.07,t);
    gain.gain.exponentialRampToValueAtTime(0.001,t+dur*0.9);
    osc.start(t);osc.stop(t+dur);
    bgmNodes.push(osc);
    t+=dur;
  });
  // ループ
  const loopId=setTimeout(()=>{
    if(bgmPlaying) playBGMLoop(notes,bgmCtx.currentTime+0.05);
  },(t-bgmCtx.currentTime-0.1)*1000);
  bgmNodes.push({stop:()=>clearTimeout(loopId)});
}

function stopBGM(){
  bgmNodes.forEach(n=>{try{if(n.stop)n.stop(0);}catch(e){}});
  bgmNodes=[];
}

function startBGM(sk){
  if(!bgmCtx)initAudio();
  if(bgmCtx.state==="suspended")bgmCtx.resume();
  stopBGM();
  bgmCurrentStage=sk;
  const notes=getBGMForStage(sk);
  playBGMLoop(notes,bgmCtx.currentTime+0.05);
}

function toggleBGM(){
  initAudio();
  if(bgmCtx.state==="suspended")bgmCtx.resume();
  bgmPlaying=!bgmPlaying;
  const btn=document.getElementById("bgm-btn");
  if(bgmPlaying){
    btn.textContent="🎵";btn.style.opacity="1";
    const sk=stageKey(state[cur]?.pts||0);
    startBGM(sk);
  } else {
    btn.textContent="🔇";btn.style.opacity="0.5";
    stopBGM();
  }
}

// ステージ変化時にBGM切り替え
function updateBGMIfNeeded(sk){
  if(!bgmPlaying) return;
  if(sk!==bgmCurrentStage) startBGM(sk);
}
</script>
<script>
// ===== GASフック =====

// キャラ情報ヘルパー
function gasCharInfo(id){
  const c=CHARS.find(x=>x.id===id);
  return {charId:id,charName:c?.name||id,shopName:shopSettings[id]?.name||""};
}
function gasFormName(id){return getForm(id)?.name||"";}

// pt変動ログ送信
function gasSendPt(charId,delta,reason){
  const s=state[charId];
  postToGAS("pt",{...gasCharInfo(charId),delta,reason,totalPts:s.pts,formName:gasFormName(charId)});
}

// Todo完了ログ送信
function gasSendTodo(charId,todoId,label,kind,pts,done){
  postToGAS("todo",{...gasCharInfo(charId),todoId,label,kind,pts,done});
}

// 気分ログ送信
function gasSendMood(charId,icon,comment,time){
  postToGAS("mood",{...gasCharInfo(charId),icon,comment,time});
}

// 市場実績スナップショット送信
function gasSendIchiba(charId){
  const s=state[charId];
  const b=s.badges||{};
  postToGAS("ichiba",{
    ...gasCharInfo(charId),
    mnpTarget:b.mnp?.target||0,    mnpActual:b.mnp?.actual||0,
    ysTarget:b.ys?.target||0,      ysActual:b.ys?.actual||0,
    sbTarget:b.sb_kihenn?.target||0,sbActual:b.sb_kihenn?.actual||0,
    ymTarget:b.ym_kihen?.target||0, ymActual:b.ym_kihen?.actual||0,
    koteiTarget:b.kotei?.target||0, koteiActual:b.kotei?.actual||0,
    paytokuRate:s.paytoku?.rate||0,
  });
}

// 収益商材スナップショット送信
function gasSendRevenue(charId){
  const s=state[charId];
  REVENUE.forEach(name=>{
    const rv=s.revenue[name]||{target:0,actual:0};
    if(rv.target||rv.actual){
      postToGAS("revenue",{...gasCharInfo(charId),name,target:rv.target,actual:rv.actual});
    }
  });
}

// 日次スナップショット送信（全キャラ）
function gasSendDailyAll(){
  CHARS.forEach(c=>{
    const s=state[c.id];
    const b=s.badges||{};

      ...gasCharInfo(c.id),

      koteiActual:b.kotei?.actual||0, paytokuRate:s.paytoku?.rate||0,

function saveGasUrl(){

  localStorage.setItem("tsg3_gas_url",v);

async function testGasConnection(){

  if(!url){el.textContent="❌ URLが未設定です";return;}

  try{
    const r=await fetch(url,{method:"GET",mode:"no-cors"});
    el.textContent="✅ 接続できました！";
  }catch(e){
    el.textContent="⚠️ 接続失敗（URLを確認してください）";
  }
}

// postToGAS を動的URL対応に上書き
const _origPost=postToGAS;
postToGAS=async function(type,data){
  const url=window.GAS_URL_RUNTIME||localStorage.getItem("tsg3_gas_url")||GAS_URL;
  if(!url)return;
  try{
    await fetch(url,{
      method:"POST",mode:"no-cors",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({type,...data})
    });
  }catch(e){console.warn("GAS送信失敗:",e);}
};

// 起動時にGAS URLを復元
window.GAS_URL_RUNTIME=localStorage.getItem("tsg3_gas_url")||"";

<script>
// ===== GAS 双方向同期 v2 =====

// saveData を上書き：localStorageに保存 + GASにも送信

// GASにデータを書き込む
async function syncToGAS(){
  const url = window.GAS_URL_RUNTIME || localStorage.getItem("tsg3_gas_url") || "";
  if(!url) return;
  try{
    await fetch(url, {
      method:"POST", mode:"no-cors",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        type:   "sync",
        device: navigator.userAgent.includes("Mobile") ? "スマホ" : "PC",
        state:  state,
        kpi:    kpi,
        shop:   shopSettings,
        ichiba: ichibaData,
      })
    });
  }catch(e){ console.warn("GAS sync失敗:", e); }
}

// 起動時にGASからデータを読み込む
async function loadFromGAS(){
  const url = window.GAS_URL_RUNTIME || localStorage.getItem("tsg3_gas_url") || "";
  if(!url) return false;

  const syncBanner = document.getElementById("sync-banner");
  if(syncBanner) { syncBanner.textContent = "☁️ データ同期中..."; syncBanner.style.display = "block"; }

  try{
    const res = await fetch(url + "?action=load", { method:"GET", mode:"cors" });
    const json = await res.json();

    if(!json.ok || !json.data) {
      if(syncBanner) syncBanner.style.display = "none";
      return false;
    }

    const d = json.data;
    const gasTime = d.updatedAt || "";
    const localTime = localStorage.getItem("tsg3_last_sync") || "";

    // GASの方が新しければ上書き
    if(gasTime > localTime || !localTime){
      if(d.state)  mergeState(state, d.state);
      if(d.kpi)    Object.assign(kpi, d.kpi);
      if(d.shop)   Object.assign(shopSettings, d.shop);
      if(d.ichiba) Object.assign(ichibaData, d.ichiba);
      localStorage.setItem("tsg3_last_sync", gasTime);
      // localStorageも更新
      _origSaveData();
      if(syncBanner){
        const dev = d.device || "別デバイス";
        syncBanner.textContent = `✅ ${dev}のデータを読み込みました（${gasTime}）`;
        setTimeout(()=>{ syncBanner.style.display="none"; }, 4000);
      }
      return true;
    } else {
      if(syncBanner){
        syncBanner.textContent = "✅ 最新データです";
        setTimeout(()=>{ syncBanner.style.display="none"; }, 2000);
      }
      return false;
    }
  } catch(e){
    console.warn("GAS読み込み失敗:", e);
    if(syncBanner) syncBanner.style.display = "none";
    return false;
  }
}

// 起動時に同期 → その後画面を再描画
window.addEventListener("DOMContentLoaded", async ()=>{
  window.GAS_URL_RUNTIME = localStorage.getItem("tsg3_gas_url") || "";
  if(window.GAS_URL_RUNTIME){
    const updated = await loadFromGAS();
    if(updated){ renderTabs(); renderChar(); }
  }
});

// 手動同期ボタン用
async function manualSync(){
  const updated = await loadFromGAS();
  if(updated){ renderTabs(); renderChar(); }
}
</script>
